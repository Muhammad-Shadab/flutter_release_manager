name: flutter_build_release
description: >-
  Build and distribute Flutter APK and IPA with one command. Uploads to Google
  Drive and Diawi automatically. No Google Cloud Console, no OAuth setup, no
  rclone knowledge required.
version: 3.0.0
homepage: https://github.com/Muhammad-Shadab/flutter_build_release
repository: https://github.com/Muhammad-Shadab/flutter_build_release
issue_tracker: https://github.com/Muhammad-Shadab/flutter_build_release/issues

topics:
  - flutter
  - build
  - release
  - distribution
  - google-drive

executables:
  flutter_release_manager:

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.5.0
  http: ^1.2.0

dev_dependencies:
  lints: ^4.0.0
