name: flutter_release_manager
description: >-
  Flutter build and release automation tool for Android and iOS. Build APKs and
  IPAs, upload to Google Drive via rclone, distribute through Diawi, and manage
  releases from a single CLI.
version: 1.0.7
homepage: https://github.com/Muhammad-Shadab/flutter_release_manager
repository: https://github.com/Muhammad-Shadab/flutter_release_manager
issue_tracker: https://github.com/Muhammad-Shadab/flutter_release_manager/issues

topics:
  - flutter
  - android
  - ios
  - build
  - release

executables:
  flutter_release_manager:

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  args: ^2.5.0
  http: ^1.2.0

dev_dependencies:
  lints: ^4.0.0
